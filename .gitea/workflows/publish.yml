name: Build and Publish Python Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Verify Python + create build venv
        run: |
          python3 --version
          python3 -m venv /tmp/build-venv
          /tmp/build-venv/bin/pip install --upgrade pip build twine

      - name: Configure pip to use Gitea PyPI feed
        run: |
          mkdir -p ~/.config/pip
          cat > ~/.config/pip/pip.conf <<EOF
          [global]
          extra-index-url = https://git.marketally.com/api/packages/ai-manifests/pypi/simple
          EOF

      - name: Build adp-agent
        working-directory: packages/adp-agent
        run: /tmp/build-venv/bin/python -m build

      - name: Build adp-agent-anchor
        working-directory: packages/adp-agent-anchor
        run: /tmp/build-venv/bin/python -m build

      - name: Publish to Gitea PyPI
        env:
          TWINE_USERNAME: gitea
          TWINE_PASSWORD: ${{ secrets.GITEATOKEN }}
        run: |
          # Gitea's PyPI implementation rejects --skip-existing as an
          # "unsupported configuration," so we invoke twine plainly and
          # detect "already exists" errors in the output instead. That
          # makes re-running the workflow against an existing tag a
          # no-op for Gitea while still letting the public PyPI step
          # below run cleanly.
          set +e
          /tmp/build-venv/bin/python -m twine upload \
            --repository-url https://git.marketally.com/api/packages/ai-manifests/pypi \
            --non-interactive \
            packages/adp-agent/dist/* packages/adp-agent-anchor/dist/* \
            2>&1 | tee /tmp/gitea-upload.log
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            # Gitea twine errors on 409 with just "HTTPError: 409 Conflict"
            # — no human-readable "already exists" string. We accept any
            # 409 as an idempotent no-op (the alternative is making
            # re-runs hard-fail when only one of the two wheels bumped).
            if grep -qiE "already exists|file already|version already|409 Conflict" /tmp/gitea-upload.log; then
              echo "::notice::Gitea PyPI upload skipped: version already published"
              exit 0
            fi
            exit "$STATUS"
          fi

      - name: Publish to public PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          # Public PyPI is append-only and permanent — a version can never
          # be replaced, only yanked. The step is tag-gated (not run on
          # workflow_dispatch) so accidental manual re-runs don't attempt
          # a re-upload and fail the whole workflow.
          /tmp/build-venv/bin/python -m twine upload \
            --non-interactive \
            packages/adp-agent/dist/* packages/adp-agent-anchor/dist/*
